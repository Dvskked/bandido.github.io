<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Calculadora de Bandidos</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="assets/css/style.css">
        <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
    </head>
    <body>

    <header class="main-header">
        <img src="assets/img/bandido1.png" class="logo">
        <h1 class="title">CALCULADORA DE BANDIDOS</h1>
        <img src="assets/img/bandido2.png" class="logo">
    </header>

    <main class="margen">

      
        <div id="registro" class="card">
            <h2>Bienvenido</h2>
            <input type="text" id="nombreUsuario" placeholder="Tu nombre">
            <button id="btnIniciar">Entrar</button>
            <a href="https://dvskked.github.io/bandidaje.github.io/" class="btn-home">
                ⬅ Volver al Inicio
            </a>
        </div>

 
        <div id="calculadora" class="card hidden">
            <p id="saludo"></p>
            <button id="juegoGo">Ir al Test</button>
        </div>

       
        <div id="juego" class="card hidden">
            <h2>Datos del Bandido</h2>

            <input type="text" id="mujer" placeholder="Nombre del bandido">


            <select id="registro1">
                <option value="">Color de pelo</option>
                <option value="1">Rubio</option>
                <option value="2">Castaño</option>
                <option value="3">Negro</option>
                <option value="4">Rojizo</option>
                <option value="5">Otro</option>
            </select>

            <select id="registro2">
                <option value="">Tipo de pelo</option>
                <option value="1">Liso</option>
                <option value="2">Ondulado</option>
                <option value="3">Churco</option>
                <option value="4">Calvo</option>
            </select>

            <select id="registro3">
                <option value="">Color de ojos</option>
                <option value="1">Negros</option>
                <option value="2">Cafes</option>
                <option value="3">Verdes</option>
                <option value="4">Azules</option>
                <option value="5">Claritos</option>
            </select>

            <select id="registro4">
                <option value="">Nariz</option>
                <option value="1">Cortica</option>
                <option value="2">Normal</option>
                <option value="3">Grande</option>
            </select>

            <select id="registro5">
                <option value="">Ciudad</option>
                <option value="1">Bumangues</option>
                <option value="2">Paisa</option>
                <option value="3">Costeño</option>
                <option value="4">Boyacense</option>
                <option value="5">Rolo</option>
                <option value="6">Caleño</option>
                <option value="7">Venezolano</option>
                <option value="8">Otra</option>
            </select>

            <select id="registro6">
                <option value="">Color de piel</option>
                <option value="1">Blanquito</option>
                <option value="2">Morenito</option>
                <option value="3">Afrocolombiano</option>
                <option value="4">Amarillo</option>
            </select>

            <select id="registro7">
                <option value="">Altura</option>
                <option value="1">Alto</option>
                <option value="2">Igual</option>
                <option value="3">Bajito</option>
            </select>

            <select id="registro8">
                <option value="">Tipo de cuerpo</option>
                <option value="1">Flaco</option>
                <option value="2">Normal</option>
                <option value="3">Gordo</option>
            </select>

            <select id="registro9">
                <option value="">Edad</option>
                <option value="1">Mayor</option>
                <option value="2">Misma edad</option>
                <option value="3">Menor</option>
            </select>

            <select id="registro10">
                <option value="">¿Lo extrañas?</option>
                <option value="si">Sí</option>
                <option value="no">No</option>
                <option value="nose">No sé</option>
            </select>

            <select id="registro11">
                <option value="">¿Muchos seguidores?</option>
                <option value="si">Sí</option>
                <option value="no">No</option>
                <option value="nose">No sé</option>
            </select>

            <input type="file" id="registro12">

            <button id="resultado">Ver resultados</button>
        </div>


        <div id="re" class="card hidden">
            <h2>Resultado Final</h2>
            <div id="resultadoMensajito"></div>
            <div id="soso"></div>
            <img id="imgResultado" class="hidden">
            <button onclick="volver()">Volver</button>
        </div>

    </main>

    <script src="assets/js/script.js"></script>
    </body>
</html>
